name: Tag Release Image

"on":
  push:
    tags:
      - '*' # Triggers on any tag push

jobs:
  tag-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # We need the parent commit!
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Retag existing image
        run: |
          # Get the SHA of the commit BEFORE the Semantic Release commit
          PARENT_SHA=$(git rev-parse HEAD^)
          
          echo "Semantic Release commit: ${{ github.sha }}"
          echo "Parent (PR Merge) commit: $PARENT_SHA"
          
          docker buildx imagetools create \
            oddwarrior/panasonic-ac-frontend:${PARENT_SHA} \
            --tag oddwarrior/panasonic-ac-frontend:${{ github.ref_name }} \
            --tag oddwarrior/panasonic-ac-frontend:latest
