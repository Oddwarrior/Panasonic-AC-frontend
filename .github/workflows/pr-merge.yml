name: Build and Push on PR Merge

"on":
  pull_request:
    types: [closed]

jobs:
  build-and-push:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Prepare Docker Tags
        id: prep
        run: |
          # Base tags for all PR merges
          TAGS="oddwarrior/panasonic-ac-frontend:${{ github.sha }},oddwarrior/panasonic-ac-frontend:pr-${{ github.event.pull_request.number }}"
          
          # If this was a Release Please PR, add the production release tags
          if [[ "${{ github.event.pull_request.head.ref }}" == release-please--* ]]; then
            VERSION=$(node -p "require('./package.json').version")
            echo "Release Please PR detected. Found version: $VERSION"
            TAGS="$TAGS,oddwarrior/panasonic-ac-frontend:v$VERSION,oddwarrior/panasonic-ac-frontend:latest"
          fi
          
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.prep.outputs.tags }}
